# One-time migration Job: SQLite → PostgreSQL
#
# Usage:
#   1. Scale down paperless:
#        kubectl scale deployment paperless -n paperless --replicas=0
#   2. Apply this Job:
#        kubectl apply -f the-lab/apps/paperless/migration-sqlite-to-postgres.yaml
#   3. Monitor progress:
#        kubectl logs -n paperless job/paperless-sqlite-to-postgres -f
#   4. Commit the chart changes – ArgoCD will redeploy paperless with PostgreSQL.
#   5. Clean up:
#        kubectl delete job paperless-sqlite-to-postgres -n paperless
#        git rm the-lab/apps/paperless/migration-sqlite-to-postgres.yaml
#
# This file lives outside templates/ so it is never managed by Helm/ArgoCD.
apiVersion: batch/v1
kind: Job
metadata:
  name: paperless-sqlite-to-postgres
  namespace: paperless
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: migrate
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.6
          command: ['/bin/bash', '-c']
          args:
            - |
              set -e
              cd /usr/src/paperless/src

              echo "=== Step 1/3: Dumping data from SQLite ==="
              PAPERLESS_DBENGINE= PAPERLESS_DBHOST= \
              python3 manage.py dumpdata \
                --natural-foreign --natural-primary \
                --exclude=contenttypes \
                --exclude=auth.Permission \
                -o /tmp/data.json

              echo "=== Step 2/3: Creating PostgreSQL schema ==="
              python3 manage.py migrate

              echo "=== Step 3/3: Loading data into PostgreSQL ==="
              python3 manage.py loaddata /tmp/data.json

              echo "=== Migration complete ==="
          env:
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_DBHOST
              value: postgres-cluster-rw.postgres.svc
            - name: PAPERLESS_DBPORT
              value: '5432'
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_DBUSER
              value: paperless
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: pg-paperless-credentials
                  key: password
          volumeMounts:
            - name: storage
              mountPath: /usr/src/paperless/data
              subPath: data
            - name: storage
              mountPath: /usr/src/paperless/media
              subPath: media
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: nfs-paperless-storage
