# sealed-secret-example.yaml
#
# This file documents the workflow for sealing n8n's encryption key as a
# SealedSecret and committing it safely to Git.
#
# IMPORTANT: This file contains PLACEHOLDER values only — do NOT use these
# values in production. Generate your own encryption key and seal it with
# kubeseal before committing.
#
# ─────────────────────────────────────────────────────────────────────────────
# WORKFLOW: Generate → Seal → Commit
# ─────────────────────────────────────────────────────────────────────────────
#
# Step 1 — Fetch the cluster's public certificate (run locally with kubeconfig):
#
#   kubeseal --fetch-cert \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     > /tmp/pub-cert.pem
#
# Step 2 — Create the raw Secret and pipe it through kubeseal:
#
#   kubectl create secret generic n8n-encryption-key \
#     --namespace=n8n \
#     --from-literal=N8N_ENCRYPTION_KEY='<your-random-32+-char-key>' \
#     --dry-run=client -o yaml | \
#   kubeseal \
#     --cert=/tmp/pub-cert.pem \
#     --format=yaml \
#     > the-lab/apps/n8n/templates/sealed-n8n-encryption-key.yaml
#
# Step 3 — Commit the SealedSecret (the raw Secret is never written to disk):
#
#   git add the-lab/apps/n8n/templates/sealed-n8n-encryption-key.yaml
#   git commit -m "feat: add sealed n8n encryption key"
#   git push
#
# ArgoCD will sync and deploy it; the sealed-secrets controller in kube-system
# decrypts it using the cluster's private key and creates a standard Secret.
#
# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE OUTPUT (placeholder — not a real sealed secret):
# ─────────────────────────────────────────────────────────────────────────────
#
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: n8n-encryption-key
#   namespace: n8n
# spec:
#   encryptedData:
#     N8N_ENCRYPTION_KEY: AgBY...truncated...placeholder==
#   template:
#     metadata:
#       name: n8n-encryption-key
#       namespace: n8n
#
# ─────────────────────────────────────────────────────────────────────────────
# To reference the sealed secret in n8n's Helm values, add to main.extraEnv:
#
#   N8N_ENCRYPTION_KEY:
#     valueFrom:
#       secretKeyRef:
#         name: n8n-encryption-key
#         key: N8N_ENCRYPTION_KEY
#
# ─────────────────────────────────────────────────────────────────────────────
# NOTE: This example file is intentionally not a deployable manifest.
# Rename/replace it with your actual sealed output from kubeseal.
