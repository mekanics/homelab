# https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/charts/ingress-nginx/values.yaml

ingress-nginx:
  controller:
    admissionWebhooks:
      certManager:
        enabled: true
      timeoutSeconds: 30
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    config:
      # Required for per-ingress configuration-snippet annotations (e.g. custom proxy headers)
      allow-snippet-annotations: 'true'
  tcp:
    1883: mosquitto/mosquitto:1883
    5432: postgres/postgres-cluster-rw:5432
