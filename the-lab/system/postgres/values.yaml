# Shared PostgreSQL instance configuration.
# Each entry drives: a managed role in the Cluster CRD, a database created by
# the init Job, and expects a pg-<owner>-credentials SealedSecret in this namespace.
databases:
  - name: n8n
    owner: n8n
    namespace: n8n
  - name: paperless
    owner: paperless
    namespace: paperless
  - name: rag_obsidian
    owner: rag_obsidian
    namespace: ~

cluster:
  storage:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 512Mi

backup:
  # Must match the cluster's major PG version so pg_dumpall is compatible.
  image: ghcr.io/cloudnative-pg/postgresql:18
  nfs:
    server: mercury.local
    path: /volume1/homelab/postgres-backup
    size: 5Gi
  # Retain this many pg_dumpall files before pruning older ones.
  # 14 = 7 full days at twice-daily frequency.
  retainCount: 14
  # Twice daily: 02:00 and 14:00 UTC. Halves the maximum data loss window to ~12h.
  schedule: '0 2,14 * * *'
