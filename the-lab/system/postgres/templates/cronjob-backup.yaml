apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      template:
        spec:
          containers:
            - name: pg-dump
              image: {{ .Values.backup.image }}
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backup/pg_dumpall-${TIMESTAMP}.sql.gz"

                  echo "Starting pg_dumpall at ${TIMESTAMP}..."
                  pg_dumpall \
                    -h postgres-cluster-rw \
                    -U postgres \
                    --clean \
                    --if-exists \
                    | gzip > "${BACKUP_FILE}"

                  echo "Verifying integrity of ${BACKUP_FILE}..."
                  gunzip -t "${BACKUP_FILE}"
                  echo "Integrity check passed."

                  # Remove any uncompressed .sql files left over from before the gzip migration.
                  ls /backup/pg_dumpall-*.sql 2>/dev/null | xargs -r rm -f

                  # Prune old dumps, keeping only the N most recent
                  ls -t /backup/pg_dumpall-*.sql.gz \
                    | tail -n +{{ add1 .Values.backup.retainCount }} \
                    | xargs -r rm -f

                  echo "Backup complete. Retained files:"
                  ls -lh /backup/pg_dumpall-*.sql.gz
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-cluster-superuser
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: nfs-postgres-backup
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 80
                  preference:
                    matchExpressions:
                      - key: node.homelab.io/storage-tier
                        operator: In
                        values:
                          - fast
