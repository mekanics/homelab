apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: pg-dump
              # Use the same PostgreSQL image version as the cluster for client compatibility.
              # ARM64 images are published by the CNPG project for Raspberry Pi.
              image: ghcr.io/cloudnative-pg/postgresql:17
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backup/pg_dumpall-${TIMESTAMP}.sql"

                  echo "Starting pg_dumpall at ${TIMESTAMP}..."
                  pg_dumpall \
                    -h postgres-cluster-rw \
                    -U postgres \
                    --clean \
                    --if-exists \
                    > "${BACKUP_FILE}"

                  echo "Backup written to ${BACKUP_FILE}"

                  # Prune old dumps, keeping only the N most recent
                  ls -t /backup/pg_dumpall-*.sql \
                    | tail -n +{{ add1 .Values.backup.retainCount }} \
                    | xargs -r rm -f

                  echo "Backup complete. Retained files:"
                  ls -lh /backup/pg_dumpall-*.sql
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-cluster-superuser
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: nfs-postgres-backup
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 80
                  preference:
                    matchExpressions:
                      - key: node.homelab.io/storage-tier
                        operator: In
                        values:
                          - fast
