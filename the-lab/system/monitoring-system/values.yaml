# https://github.com/prometheus-community/helm-charts/blob/kube-prometheus-stack-45.30.1/charts/kube-prometheus-stack/values.yaml
kube-prometheus-stack:
  # https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
  grafana:
    enabled: true
    defaultDashboardsTimezone: Europe/Zurich
    forceDeployDatasources: true
    forceDeployDashboards: true
    # http://docs.grafana.org/administration/provisioning/#datasources

    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.loki:3100

      - name: Sun and Moon
        type: fetzerch-sunandmoon-datasource
        access: proxy
        basicAuth: false
        editable: true

    plugins:
      - grafana-clock-panel
      - fetzerch-sunandmoon-datasource

    grafana.ini:
      server:
        root_url: https://grafana.mekanics.ch

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: mekanics-ca-issuer
        hajimari.io/group: Monitoring
        hajimari.io/appName: Grafana
        hajimari.io/icon: chart-bar
      hosts:
        - &host grafana.mekanics.ch
      tls:
        - secretName: grafana-general-tls
          hosts:
            - *host

    initChownData:
      enabled: false

    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 384Mi

    persistence:
      enabled: true
      type: pvc
      existingClaim: nfs-monitoring-grafana

    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            preference:
              matchExpressions:
                - key: node.homelab.io/storage-type
                  operator: In
                  values: ['ssd']

  prometheus:
    prometheusSpec:
      # Memory optimization for Raspberry Pi cluster
      retention: 3d
      retentionSize: 1500MB
      scrapeInterval: 60s
      evaluationInterval: 60s
      resources:
        limits:
          cpu: 500m
          memory: 2048Mi
        requests:
          cpu: 100m
          memory: 1024Mi
      # Reduce memory pressure on Pi: compress WAL, limit in-memory chunks
      walCompression: true
      tsdbConfig:
        max_block_duration: 2h
        min_block_duration: 30m
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      # Removed performance affinity to allow better load distribution
      # Both nodes have SSDs, so storage-type preference is kept
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node.homelab.io/storage-type
                    operator: In
                    values: ['ssd']

  # Additional exporters
  prometheus-node-exporter:
    enabled: true

  kube-state-metrics:
    enabled: true

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        limits:
          memory: 64Mi
        requests:
          memory: 32Mi
      alertmanagerConfigMatcherStrategy:
        type: None
      secrets:
        - alertmanager-slack-secret
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: slack-default
        routes:
          # Mute synthetic / k3s-incompatible alerts (no Slack notification)
          - matchers:
              - alertname =~ "Watchdog|InfoInhibitor|KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown"
            receiver: 'null'
          - matchers:
              - severity = critical
            receiver: slack-critical
          - matchers:
              - severity = warning
            receiver: slack-warning
      receivers:
        - name: 'null'
        - name: slack-default
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhookUrl
              channel: '#the-dark-side'
              title: '{{ template "slack.default.title" . }}'
              text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
              send_resolved: true
        - name: slack-critical
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhookUrl
              channel: '#the-dark-side'
              title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
              text: '{{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}\n{{ end }}'
              send_resolved: true
        - name: slack-warning
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhookUrl
              channel: '#the-dark-side'
              title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
              text: '{{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n{{ end }}'
              send_resolved: true
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity = warning
          equal: ['alertname', 'namespace']
