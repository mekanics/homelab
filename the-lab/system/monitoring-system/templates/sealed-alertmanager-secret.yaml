# To re-seal the webhook URL:
#   echo -n 'https://hooks.slack.com/services/T.../B.../xxx' | \
#     kubeseal --raw --from-file=/dev/stdin \
#     --namespace monitoring-system \
#     --name alertmanager-slack-secret \
#     --scope cluster-wide
# Then replace the encryptedData.webhookUrl value below.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: 'true'
  creationTimestamp: null
  name: alertmanager-slack-secret
  namespace: monitoring-system
spec:
  encryptedData:
    webhookUrl: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: 'true'
      creationTimestamp: null
      name: alertmanager-slack-secret
      namespace: monitoring-system
