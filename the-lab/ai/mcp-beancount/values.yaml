mcp-server:
  image:
    repository: ghcr.io/mekanics/mcp-beancount
    tag: 0.3.0

  mcp:
    port: 3000

  # No secret needed — read-only file access, no credentials
  env:
    - name: FASTMCP_TRANSPORT
      value: streamable-http
    - name: FASTMCP_HOST
      value: "0.0.0.0"
    - name: BEANCOUNT_FILE
      value: /bean/main.bean
    - name: BASE_CURRENCY
      value: CHF
    - name: LOG_LEVEL
      value: WARNING

  # Mount the same NFS share that fava uses (ReadWriteMany, so safe to share)
  strategyType: RollingUpdate

  persistence:
    data:
      enabled: true
      type: nfs
      mountPath: /bean
      readOnly: true
      server: 192.168.10.12
      path: /volume1/homelab/finance.ajo

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mekanics-ca-issuer
      hajimari.io/group: AI
      hajimari.io/appName: MCP Beancount
      hajimari.io/icon: finance
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    hosts:
      - host: &host mcp-beancount.mekanics.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: mcp-beancount-tls-certificate
        hosts:
          - *host

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
      cpu: 250m

  probes:
    startup:
      enabled: true
    liveness:
      enabled: true
    readiness:
      enabled: true
