mcp-server:
  image:
    repository: ghcr.io/mekanics/mcp-plex
    tag: latest

  mcp:
    port: 3000
    transport: streamable-http

  existingSecret: mcp-plex-secrets

  env:
    - name: LOG_LEVEL
      value: WARNING

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mekanics-ca-issuer
      hajimari.io/group: AI
      hajimari.io/appName: MCP Plex
      hajimari.io/icon: plex
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    hosts:
      - host: &host mcp-plex.mekanics.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: mcp-plex-tls-certificate
        hosts:
          - *host

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
      cpu: 250m

  probes:
    startup:
      enabled: true
      spec:
        httpGet:
          path: /mcp
          port: http
        failureThreshold: 24
        periodSeconds: 10
        timeoutSeconds: 5
    liveness:
      enabled: true
      spec:
        httpGet:
          path: /mcp
          port: http
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
    readiness:
      enabled: true
      spec:
        httpGet:
          path: /mcp
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
