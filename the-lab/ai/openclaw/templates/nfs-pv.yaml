# NFS PersistentVolume for Synology workspace
# Synology NFS export must allow uid/gid 1000 (container runs as node:1000)
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-home-nfs
  labels:
    app.kubernetes.io/name: openclaw
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.10.12 # mercury.local — static IP avoids mDNS lookup delays at mount time
    path: /volume1/openclaw
  mountOptions:
    - nfsvers=4
    - noatime
    - nocto
    - actimeo=600
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home-nfs
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: openclaw-home-nfs
  storageClassName: ''
