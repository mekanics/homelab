openclaw:
  image:
    repository: ghcr.io/mekanics/openclaw-image
    # renovate: datasource=docker depName=ghcr.io/mekanics/openclaw-image
    tag: '43720d6'

  env:
    - name: TZ
      value: Europe/Zurich
    - name: OPENCLAW_DISABLE_BONJOUR
      value: '1'
    - name: GIT_CONFIG_GLOBAL
      value: /home/node/.openclaw/workspace/config/gitconfig
    # Playwright (if custom image)
    # - name: PLAYWRIGHT_BROWSERS_PATH
    #   value: /home/node/.cache/ms-playwright
    # Tell V8 its heap ceiling so it doesn't OOM-panic on ARM64 during cold start.
    # Without this, V8 picks a conservative default and crashes when it can't grow.
    # 1536 leaves ~512MB headroom under the 2Gi container limit.
    - name: NODE_OPTIONS
      value: '--max-old-space-size=1536'
    # Skip the entry-point self-respawn (saves ~50-100MB peak RSS at startup).
    - name: OPENCLAW_NO_RESPAWN
      value: '1'
    # Persist V8's module compile cache across restarts (stored on Longhorn PVC).
    # After the first cold start, Node skips re-parsing 4000+ JS files — meaningful
    # on ARM64 where JS compilation is CPU/memory intensive.
    - name: NODE_COMPILE_CACHE
      value: /home/node/.node-compile-cache
    # -------------------------------------------------------------------
    # lossless-claw (LCM) — context engine plugin
    # SQLite lives on Longhorn PVC (not NFS) to avoid file-locking issues.
    # All other LCM config lives in openclaw.configOverride below.
    # -------------------------------------------------------------------
    - name: LCM_DATABASE_PATH
      value: /home/node/.openclaw-db/lcm.db

  persistence:
    home:
      existingClaim: openclaw-home-nfs
    compile-cache:
      enabled: true
      type: pvc
      mountPath: /home/node/.node-compile-cache
      readOnly: false
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 1Gi
      retain: true
    # Dedicated Longhorn PVC for lossless-claw LCM SQLite database.
    # Must NOT be on NFS (Synology) — SQLite file locking breaks on NFS.
    # Mounted at a path outside ~/.openclaw to avoid the NFS-backed home volume.
    lcm-db:
      enabled: true
      type: pvc
      mountPath: /home/node/.openclaw-db
      readOnly: false
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 2Gi
      retain: true

  # -------------------------------------------------------------------
  # lossless-claw plugin config — injected into openclaw.json via ConfigMap.
  # Non-secret tuning params moved here from env vars (cleaner than a wall
  # of LCM_* vars; env vars always win on top of this if set).
  # -------------------------------------------------------------------
  configOverride: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": { "mode": "trusted-proxy", "trustedProxy": { "userHeader": "X-Forwarded-User" } },
        "controlUi": { "enabled": true }
      },
      "agents": {
        "defaults": { "workspace": "~/.openclaw/workspace" },
        "list": [{ "id": "default", "name": "OpenClaw Assistant", "workspace": "~/.openclaw/workspace" }]
      },
      "cron": { "enabled": false },
      "plugins": {
        "slots": { "contextEngine": "lossless-claw" },
        "entries": {
          "lossless-claw": {
            "enabled": true,
            "config": {
              "freshTailCount": 32,
              "contextThreshold": 0.75,
              "incrementalMaxDepth": -1,
              "summaryModel": "anthropic/claude-haiku-4-5",
              "ignoreSessionPatterns": ["agent:*:cron:**"]
            }
          }
        }
      }
    }

  # Override the gateway startup command to install the lossless-claw plugin
  # before the gateway process starts. The plugin is installed into the NFS-backed
  # home PVC so it persists across pod restarts (install is a no-op if already present).
  gateway:
    command:
      - sh
      - -ec
      - |
        openclaw plugins install @martian-engineering/lossless-claw --yes 2>&1 || true
        exec node /app/dist/index.js gateway run

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mekanics-ca-issuer
      hajimari.io/group: AI
      hajimari.io/appName: OpenClaw
      hajimari.io/icon: robot
      nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
      # Injects X-Forwarded-User for trusted-proxy auth without requiring snippet annotations.
      # References the ConfigMap in templates/proxy-headers-configmap.yaml.
      nginx.ingress.kubernetes.io/proxy-set-headers: openclaw/openclaw-proxy-headers
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    hosts:
      - host: &host openclaw.mekanics.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: openclaw-tls-certificate
        hosts:
          - *host

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
      cpu: '1'

  probes:
    startup:
      spec:
        # Allows up to 600s (10min) for cold start (60 attempts × 10s)
        failureThreshold: 60

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node.homelab.io/storage-tier
                operator: In
                values: [fast]
