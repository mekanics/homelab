openclaw:
  image:
    repository: ghcr.io/mekanics/openclaw-image
    tag: latest

  env:
    - name: TZ
      value: Europe/Zurich
    - name: OPENCLAW_GATEWAY_BIND
      value: lan
    # Playwright (if custom image)
    # - name: PLAYWRIGHT_BROWSERS_PATH
    #   value: /home/node/.cache/ms-playwright

  persistence:
    home:
      existingClaim: openclaw-home-nfs

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mekanics-ca-issuer
      hajimari.io/group: AI
      hajimari.io/appName: OpenClaw
      hajimari.io/icon: robot
      # WebSocket support
      nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
      nginx.ingress.kubernetes.io/server-snippets: |
        location / {
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }
    hosts:
      - host: &host openclaw.mekanics.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: openclaw-tls-certificate
        hosts:
          - *host

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
      cpu: '1'

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node.homelab.io/storage-tier
                operator: In
                values: [fast]
