openclaw:
  image:
    repository: ghcr.io/mekanics/openclaw-image
    # renovate: datasource=docker depName=ghcr.io/mekanics/openclaw-image
    tag: '2026.4.12-slim-1'

  env:
    - name: TZ
      value: Europe/Zurich
    - name: OPENCLAW_DISABLE_BONJOUR
      value: '1'
    - name: GIT_CONFIG_GLOBAL
      value: /home/node/.openclaw/workspace/config/gitconfig
    # Playwright (if custom image)
    # - name: PLAYWRIGHT_BROWSERS_PATH
    #   value: /home/node/.cache/ms-playwright
    # Tell V8 its heap ceiling so it doesn't OOM-panic on ARM64 during cold start.
    # Without this, V8 picks a conservative default and crashes when it can't grow.
    # 1536 leaves ~512MB headroom under the 2Gi container limit.
    - name: NODE_OPTIONS
      value: '--max-old-space-size=1536'
    # Skip the entry-point self-respawn (saves ~50-100MB peak RSS at startup).
    - name: OPENCLAW_NO_RESPAWN
      value: '1'
    # Persist V8's module compile cache across restarts (stored on Longhorn PVC).
    # After the first cold start, Node skips re-parsing 4000+ JS files — meaningful
    # on ARM64 where JS compilation is CPU/memory intensive.
    - name: NODE_COMPILE_CACHE
      value: /home/node/.node-compile-cache
  persistence:
    home:
      existingClaim: openclaw-home-nfs
    compile-cache:
      enabled: true
      type: pvc
      mountPath: /home/node/.node-compile-cache
      readOnly: false
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 1Gi
      retain: true
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mekanics-ca-issuer
      hajimari.io/group: AI
      hajimari.io/appName: OpenClaw
      hajimari.io/icon: robot
      nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
      # Injects X-Forwarded-User for trusted-proxy auth without requiring snippet annotations.
      # References the ConfigMap in templates/proxy-headers-configmap.yaml.
      nginx.ingress.kubernetes.io/proxy-set-headers: openclaw/openclaw-proxy-headers
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    hosts:
      - host: &host openclaw.mekanics.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: openclaw-tls-certificate
        hosts:
          - *host

  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      memory: 4Gi
      cpu: '1'

  priorityClassName: high-priority-homelab

  probes:
    startup:
      spec:
        exec: null
        httpGet:
          path: /healthz
          port: 18789
        failureThreshold: 60
        periodSeconds: 10
        timeoutSeconds: 5
    liveness:
      spec:
        exec: null
        httpGet:
          path: /healthz
          port: 18789
        failureThreshold: 10
        periodSeconds: 30
        timeoutSeconds: 10
    readiness:
      spec:
        exec: null
        httpGet:
          path: /readyz
          port: 18789
        failureThreshold: 3
        periodSeconds: 10
        timeoutSeconds: 5

  nodeSelector:
    node.homelab.io/performance: high
    node.homelab.io/generation: pi5
