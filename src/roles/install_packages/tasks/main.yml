- name: Upgrade existing APT packages
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    cache_valid_time: 3600
    autoclean: true

- name: Common APT dependencies
  ansible.builtin.apt:
    name: '{{ item.key }}'
    state: '{{ item.value }}'
  with_dict: '{{ common_apt_dependencies }}'
