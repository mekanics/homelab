---
# ── NTP / time synchronization ─────────────────────────────────────────────
# Pi boards have no hardware RTC; clock starts in the past until NTP syncs.
# Kubernetes/etcd require accurate time. chrony is the default NTP daemon on
# Debian 12+ and handles rapid initial sync better than systemd-timesyncd.

- name: Ensure chrony is installed
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true

- name: Wait for time synchronization
  ansible.builtin.command: chronyc waitsync 30 0.1 0 10
  register: chrony_waitsync
  changed_when: false
  failed_when: chrony_waitsync.rc != 0
  # waitsync args: max-tries=30, max-correction=0.1s, max-skew=0 (unlimited),
  # interval=10s → waits up to 5 min for initial sync on cold boot

- name: Activating cgroup support
  lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^((?!.*\bcgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory\b).*)$'
    line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
    backrefs: true
    state: present
  register: cgroup_flags
  notify: Reboot

- name: Disable WiFi on cluster nodes
  ansible.builtin.command: rfkill block wifi
  changed_when: true

- name: Turn off swap
  command: 'dphys-swapfile swapoff'
  register: swapfile_status
  ignore_errors: true

- name: Uninstall dphys-swapfile
  command: 'dphys-swapfile uninstall'
  register: swapfile_status
  ignore_errors: true

- name: Remove dphys-swapfile from startup
  command: 'update-rc.d dphys-swapfile remove'

- name: Purge dphys-swapfile
  apt:
    name: dphys-swapfile
    state: absent
    purge: true

# ── zram swap ──────────────────────────────────────────────────────────────
# Provides compressed in-memory swap as a burst buffer (lz4, ~2:1 ratio).
# zram_percent defaults to 25 (role defaults); override in host_vars for nodes
# where a lower cap is more appropriate (e.g. 10% on the 16 GB Pi 5 node).
# kubelet is configured with fail-swap-on=false so it starts alongside zram.

- name: Install zram-tools
  apt:
    name: zram-tools
    state: present
    update_cache: true

- name: Configure zramswap — set ALGO to lz4
  lineinfile:
    path: /etc/default/zramswap
    regexp: '^#?\s*ALGO='
    line: 'ALGO=lz4'
    state: present

- name: Configure zramswap — set PERCENT
  lineinfile:
    path: /etc/default/zramswap
    regexp: '^#?\s*PERCENT='
    line: 'PERCENT={{ zram_percent }}'
    state: present

- name: Enable and start zramswap service
  systemd:
    name: zramswap
    state: started
    enabled: true
    daemon_reload: true

# ── sysctl tuning ──────────────────────────────────────────────────────────
# swappiness=10: prefer RAM strongly, only use zram swap under real pressure.
# (Lower than default 60; higher than old 0 which blocked zram from activating.)

- name: Apply homelab sysctl tuning
  ansible.posix.sysctl:
    name: '{{ item.name }}'
    value: '{{ item.value }}'
    sysctl_file: /etc/sysctl.d/99-homelab.conf
    reload: true
    state: present
  loop:
    - { name: vm.swappiness, value: '10' }

- name: Copy systemd unit to disable EEE on eth0
  copy:
    src: disable-eth0-eee.service
    dest: /etc/systemd/system/disable-eth0-eee.service
    mode: '0644'

- name: Disable EEE on eth0 to prevent NIC errors
  systemd:
    name: disable-eth0-eee.service
    state: started
    enabled: true
    daemon_reload: true
