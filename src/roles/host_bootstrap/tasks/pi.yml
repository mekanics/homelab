---
# ── NTP / time synchronization ─────────────────────────────────────────────
# Pi boards have no hardware RTC; clock starts in the past until NTP syncs.
# Kubernetes/etcd require accurate time. chrony is the default NTP daemon on
# Debian 12+ and handles rapid initial sync better than systemd-timesyncd.

- name: Ensure chrony is installed
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true

- name: Wait for time synchronization
  ansible.builtin.command: chronyc waitsync 30 0.1 0 10
  register: chrony_waitsync
  changed_when: false
  failed_when: chrony_waitsync.rc != 0
  # waitsync args: max-tries=30, max-correction=0.1s, max-skew=0 (unlimited),
  # interval=10s → waits up to 5 min for initial sync on cold boot

# Three separate passes so each flag is checked independently. A single regex
# matching the exact ordered triplet would miss partial prior states and
# append duplicate flags on re-runs.
- name: Activate cgroup_enable=cpuset in cmdline.txt
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^((?!.*\bcgroup_enable=cpuset\b).*)$'
    line: '\1 cgroup_enable=cpuset'
    backrefs: true
    state: present
  notify: Reboot

- name: Activate cgroup_memory=1 in cmdline.txt
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^((?!.*\bcgroup_memory=1\b).*)$'
    line: '\1 cgroup_memory=1'
    backrefs: true
    state: present
  notify: Reboot

- name: Activate cgroup_enable=memory in cmdline.txt
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^((?!.*\bcgroup_enable=memory\b).*)$'
    line: '\1 cgroup_enable=memory'
    backrefs: true
    state: present
  notify: Reboot

- name: Check WiFi block state
  ansible.builtin.command: rfkill list wifi
  register: rfkill_status
  changed_when: false

- name: Disable WiFi on cluster nodes
  ansible.builtin.command: rfkill block wifi
  changed_when: true
  when: '"Soft blocked: yes" not in rfkill_status.stdout'

- name: Turn off swap
  ansible.builtin.command: dphys-swapfile swapoff
  register: swapoff_result
  changed_when: false
  failed_when:
    - swapoff_result.rc != 0
    - "'No such file or directory' not in swapoff_result.msg"

- name: Uninstall dphys-swapfile
  ansible.builtin.command: dphys-swapfile uninstall
  register: swapuninstall_result
  changed_when: false
  failed_when:
    - swapuninstall_result.rc != 0
    - "'No such file or directory' not in swapuninstall_result.msg"

- name: Purge dphys-swapfile
  ansible.builtin.apt:
    name: dphys-swapfile
    state: absent
    purge: true

# ── zram swap ──────────────────────────────────────────────────────────────
# Provides compressed in-memory swap as a burst buffer (lz4, ~2:1 ratio).
# Uses systemd-zram-generator (ships with Raspberry Pi OS Bookworm) rather than
# the legacy zram-tools package, which conflicts with the generator on Bookworm.
# Fixed at zram_size_mb (default 512 MiB) — enough to absorb transient memory
# spikes without masking OOM situations Kubernetes should handle via eviction.
# kubelet is configured with fail-swap-on=false so it starts alongside zram.

- name: Remove zram-tools if installed
  ansible.builtin.apt:
    name: zram-tools
    state: absent
    purge: true

- name: Install systemd-zram-generator
  ansible.builtin.apt:
    name: systemd-zram-generator
    state: present
    update_cache: false

- name: Configure zram via systemd-zram-generator
  ansible.builtin.template:
    src: zram-generator.conf.j2
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart zram swap

- name: Start zram swap unit
  ansible.builtin.systemd:
    name: dev-zram0.swap
    daemon_reload: true
    state: started

# ── sysctl tuning ──────────────────────────────────────────────────────────
# swappiness=10: prefer RAM strongly, only use zram swap under real pressure.
# (Lower than default 60; higher than old 0 which blocked zram from activating.)

- name: Apply homelab sysctl tuning
  ansible.posix.sysctl:
    name: '{{ item.name }}'
    value: '{{ item.value }}'
    sysctl_file: /etc/sysctl.d/99-homelab.conf
    reload: true
    state: present
  loop:
    - { name: vm.swappiness, value: '10' }

- name: Copy systemd unit to disable EEE on eth0
  ansible.builtin.copy:
    src: disable-eth0-eee.service
    dest: /etc/systemd/system/disable-eth0-eee.service
    mode: '0644'

- name: Disable EEE on eth0 to prevent NIC errors
  ansible.builtin.systemd:
    name: disable-eth0-eee.service
    state: started
    enabled: true
    daemon_reload: true
