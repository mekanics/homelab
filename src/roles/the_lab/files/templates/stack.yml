{{- range $index, $stack := .Values.stacks }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $stack.name }}
  namespace: {{ $.Release.Namespace }}
spec:
  generators:
    - git:
        repoURL: {{ $.Values.gitops.repo }}
        revision: {{ $.Values.gitops.revision }}
        directories:
          - path: the-lab/{{ $stack.name }}/*
          - path: the-lab/{{ $stack.name }}/_*
            exclude: true
  
  template:
    metadata:
      name: '{{ `{{path.basename}}` }}'
      {{- if $stack.syncWave }}
      annotations:
        argocd.argoproj.io/sync-wave: "{{ $stack.syncWave }}"
      {{- end }}
    
    spec:
      project: default
      
      source:
        repoURL: {{ $.Values.gitops.repo }}
        targetRevision: {{ $.Values.gitops.revision }}
        path: '{{ `{{path}}` }}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ default `{{path.basename}}` $stack.namespace }}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        
        retry:
          limit: 10
          backoff:
            duration: 1m
            factor: 2
            maxDuration: 16m
        
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true

      # Ignore differences in the creation timestamp of the volume claim template
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - '.spec.volumeClaimTemplates[]?.metadata.creationTimestamp'

        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas

        # CNPG admission webhook injects these defaults into the Cluster spec at
        # apply-time; they appear in the live resource but not in the Helm template,
        # causing a perpetual diff. Ignoring them here stops the sync loop.
        - group: postgresql.cnpg.io
          kind: Cluster
          jqPathExpressions:
            - .spec.enablePDB
            - .spec.failoverDelay
            - .spec.imageName
            - .spec.logLevel
            - .spec.maxSyncReplicas
            - .spec.minSyncReplicas
            - .spec.postgresGID
            - .spec.postgresUID
            - .spec.primaryUpdateMethod
            - .spec.probes
            - .spec.replicationSlots
            - .spec.smartShutdownTimeout
            - .spec.startDelay
            - .spec.stopDelay
            - .spec.switchoverDelay
            - '.spec.managed.roles[].connectionLimit'
            - '.spec.managed.roles[].ensure'
            - '.spec.managed.roles[].inherit'

        # kubeseal always emits creationTimestamp: null in spec.template.metadata,
        # but the API server strips null timestamps from the stored object.
        - group: bitnami.com
          kind: SealedSecret
          jqPathExpressions:
            - .spec.template.metadata.creationTimestamp

{{- end }}